name: Deploy to GitHub Pages

# 静的サイト(index.html + js/)を GitHub Pages へ公開する。
# センサー(GPS・方位)は HTTPS 下でのみ動作するため Pages のHTTPSが必須。
#
# 事前にリポジトリ設定が必要:
#   Settings → Pages → Build and deployment → Source: "GitHub Actions"

on:
  push:
    branches:
      - main
      - claude/vr-fireworks-viewer-N7cAk
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# 同時デプロイは1つに制限
concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
        with:
          # 初回実行時にPagesを自動で有効化(Source=GitHub Actions)。
          # これにより Settings の手動切替が不要になる。
          enablement: true
      - uses: actions/upload-pages-artifact@v3
        with:
          path: .
      - id: deployment
        uses: actions/deploy-pages@v4
